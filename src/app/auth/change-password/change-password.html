<div class="change-password-container p-4">
  <div class="card shadow-sm border-0">
    <div class="card-body">
      <h3 class="card-title mb-4">Change Password</h3>
      
      <div *ngIf="message" [class]="'alert ' + (isError ? 'alert-danger' : 'alert-success') + ' mb-3'">
        {{ message }}
      </div>

      <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label">Current Password</label>
          <input type="password" formControlName="oldPassword" class="form-control" placeholder="Enter current password">
          <div *ngIf="passwordForm.get('oldPassword')?.touched && passwordForm.get('oldPassword')?.invalid" class="text-danger small">
            Current password is required
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">New Password</label>
          <input type="password" formControlName="newPassword" class="form-control" placeholder="Min 6 characters">
          <div *ngIf="passwordForm.get('newPassword')?.touched && passwordForm.get('newPassword')?.invalid" class="text-danger small">
            New password is required (min 6 characters)
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label">Confirm New Password</label>
          <input type="password" formControlName="confirmPassword" class="form-control" placeholder="Repeat new password">
          <div *ngIf="passwordForm.get('confirmPassword')?.touched && passwordForm.hasError('passwordMismatch')" class="text-danger small">
            Passwords do not match
          </div>
        </div>

        <button type="submit" [disabled]="passwordForm.invalid || loading" class="btn btn-success w-100">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          {{ loading ? 'Updating...' : 'Update Password' }}
        </button>
      </form>
    </div>
  </div>
</div>
